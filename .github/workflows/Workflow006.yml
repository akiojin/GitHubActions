name: Build and Test
on: push
jobs:
  Build:
    runs-on: ubuntu-latest
    outputs:
      build_id: ${{ steps.Build.outputs.build_id }}
    steps:
      - name: Build
        id: Build
        run: echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
  Test:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - run: echo ${{ needs.Build.outputs.build_id }}
  Succeeded:
    needs: [ Build, Test ]
    runs-on: ubuntu-latest
    if: ${{ success() }}
    steps:
      - run: echo Succeeded
  Falied:
    needs: [ Build, Test ]
    runs-on: ubuntu-latest
    if: ${{ failure() }}
    steps:
      - run: echo Failed