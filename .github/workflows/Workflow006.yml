name: Build and Test
on: push
jobs:
  Build:
    runs-on: ubuntu-latest
    outputs:
      build_id: ${{ steps.build_step.outputs.build_id }}
    steps:
      - name: Build
        id: build_step
        run: echo "build_id=${{ github.run_number }}" >> $GITHUB_OUTPUT
      - run: echo ${{ steps.build_step.outputs.build_id }}
  Test:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - run: echo ${{ needs.Build.outputs.build_id }}
  Succeeded:
    needs: [ Build, Test ]
    runs-on: ubuntu-latest
    if: ${{ success() }}
    steps:
      - run: echo Succeeded
  Falied:
    needs: [ Build, Test ]
    runs-on: ubuntu-latest
    if: ${{ failure() }}
    steps:
      - run: echo Failed